# The FLT Verso blueprint is a self-contained Lake package nested in the FLT
# repository. It deliberately does not touch FLT's own `lakefile.toml`.

name = "FLTBlueprint"
precompileModules = false
defaultTargets = ["FLTBlueprint"]

[leanOptions]
experimental.module = true
verso.blueprint.foldCodeBlocks = true

# Dependency resolution note: VersoBlueprint and Mathlib
# pin different versions of ProofWidgets and plausible.
# A later `require` wins, so `FLT` is listed after `VersoBlueprint`,
# and consequently dependency versions pinned by `FLT` are used.
# This keeps `lake exe cache get` able to find Mathlib's prebuilt cache
# instead of triggering a full Mathlib rebuild.

[[require]]
name = "VersoBlueprint"
git = "https://github.com/leanprover/verso-blueprint"
rev = "v4.31.0"

[[require]]
name = "FLT"
path = ".."

[[lean_lib]]
name = "FLTBlueprint"

[[lean_exe]]
name = "blueprint-gen"
root = "FLTBlueprintMain"
